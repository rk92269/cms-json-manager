version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: cms-json-manager-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server1:
    build:
      context: ./server
    container_name: cms-json-manager-server1
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/cms_json_manager
    ports:
      - "5001:5000"
 
  server2:
    build:
      context: ./server
    container_name: cms-json-manager-server2
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/cms_json_manager
    ports:
      - "5002:5000"

  nginx:
    image: nginx:alpine
    container_name: cms-json-manager-nginx
    restart: unless-stopped
    depends_on:
      - server1
      - server2
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"

  kong:
    image: kong:3.7
    container_name: cms-json-manager-kong
    restart: unless-stopped
    depends_on:
      - nginx
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"

  client:
    build:
      context: ./client
      args:
        REACT_APP_API_URL: http://localhost:8000/api/documents
    container_name: cms-json-manager-client
    restart: unless-stopped
    depends_on:
      - kong
    ports:
      - "3000:80"

volumes:
  mongodb_data:
